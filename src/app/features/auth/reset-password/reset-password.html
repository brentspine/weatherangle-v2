<app-auth-layout title="Reset your password">
  <app-form-error [message]="errorMessage()" />

  @if (!resetToken()) {
    <app-verification-stepper [texts]="texts" [endpoints]="endpoints" (verified)="onVerified($event)" />
  } @else {
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="mb-3 text-start">
        <label for="new-password-input" class="form-label">New password</label>
        <input
          id="new-password-input"
          type="password"
          class="form-control"
          formControlName="newPassword"
          autocomplete="new-password"
          placeholder="New password"
        >
      </div>

      <div class="mb-3 text-start">
        <label for="confirm-password-input" class="form-label">Confirm password</label>
        <input
          id="confirm-password-input"
          type="password"
          class="form-control"
          formControlName="confirmPassword"
          autocomplete="new-password"
          placeholder="Confirm password"
        >
        @if (form.errors?.['passwordsMismatch'] && form.get('confirmPassword')?.touched) {
          <div class="form-text text-danger">Passwords do not match.</div>
        }
      </div>

      <button type="submit" class="btn btn-primary w-100" [disabled]="loading()">
        @if (loading()) {
          <app-loading-spinner />
        }
        Set new password
      </button>
    </form>
  }

  <p class="create-account">
    <a routerLink="/login">Back to sign in</a>
  </p>
</app-auth-layout>
